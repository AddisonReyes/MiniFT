{% extends 'base.html' %}

{% block title %}
  Category Summary
{% endblock %}

{% block content %}
  <div class="mx-auto max-w-2xl">
    <div class="rounded-2xl border border-black/10 bg-white p-6 shadow-sm dark:border-white/10 dark:bg-white/5">
      <div class="flex items-start justify-between gap-3">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Spending by Category</h1>
          <p class="mt-1 text-sm text-black/70 dark:text-white/70">Current month expenses grouped by category.</p>
        </div>
        <a href="{% url 'web-transactions' %}" class="text-sm font-medium text-brand-700 hover:underline dark:text-brand-300">Back</a>
      </div>

      <div class="mt-6 overflow-x-auto">
        <table class="w-full min-w-[420px] border-separate border-spacing-0 text-sm">
          <thead>
            <tr class="text-left text-black/70 dark:text-white/70">
              <th class="border-b border-black/10 p-3 dark:border-white/10">Category</th>
              <th class="border-b border-black/10 p-3 dark:border-white/10">Total</th>
            </tr>
          </thead>
          <tbody>
            {% for c in categories %}
              <tr class="hover:bg-black/5 dark:hover:bg-white/10">
                <td class="border-b border-black/10 p-3 dark:border-white/10">{{ c.category }}</td>
                <td class="border-b border-black/10 p-3 dark:border-white/10">{{ c.total }}</td>
              </tr>
            {% empty %}
              <tr>
                <td colspan="2" class="p-6 text-center text-sm text-black/70 dark:text-white/70">No data</td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
{% endblock %}
