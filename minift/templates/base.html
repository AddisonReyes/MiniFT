<!DOCTYPE html>
<html>
  <head>
    <title>
      {% block title %}
        MiniFT
      {% endblock %}
    </title>
  </head>
  <body>
    <nav>
      {% if user.is_authenticated %}
        <a href="{% url 'web-home' %}">Dashboard</a> |
        <a href="{% url 'web-transactions' %}">Transactions</a> |
        <a href="{% url 'web-budgets' %}">Budgets</a> |
        <a href="{% url 'web-me' %}">My Account</a> |<form action="{% url 'web-logout' %}" method="post" style="display:inline">
          {% csrf_token %}
          <button type="submit">Logout</button>
        </form>
      {% else %}
        <a href="{% url 'web-login' %}">Login</a> |
        <a href="{% url 'web-register' %}">Register</a>
      {% endif %}
    </nav>

    {% if messages %}
      <ul>
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    {% block content %}
    {% endblock %}
  </body>
</html>
