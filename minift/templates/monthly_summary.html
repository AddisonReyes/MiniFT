{% extends 'base.html' %}

{% block title %}
  Monthly Summary
{% endblock %}

{% block content %}
  <div class="mx-auto max-w-2xl">
    <div class="rounded-2xl border border-black/10 bg-white p-6 shadow-sm dark:border-white/10 dark:bg-white/5">
      <div class="flex items-start justify-between gap-3">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Monthly Summary</h1>
          <p class="mt-1 text-sm text-black/70 dark:text-white/70">Month: {{ month }}</p>
        </div>
        <a href="{% url 'web-transactions' %}" class="text-sm font-medium text-brand-700 hover:underline dark:text-brand-300">Back</a>
      </div>

      <div class="mt-6 grid gap-3 sm:grid-cols-3">
        <div class="rounded-xl border border-black/10 bg-white p-4 dark:border-white/10 dark:bg-black">
          <p class="text-xs text-black/60 dark:text-white/60">Total Income</p>
          <p class="mt-1 text-lg font-semibold">{{ total_income }}</p>
        </div>
        <div class="rounded-xl border border-black/10 bg-white p-4 dark:border-white/10 dark:bg-black">
          <p class="text-xs text-black/60 dark:text-white/60">Total Expenses</p>
          <p class="mt-1 text-lg font-semibold">{{ total_expenses }}</p>
        </div>
        <div class="rounded-xl border border-black/10 bg-white p-4 dark:border-white/10 dark:bg-black">
          <p class="text-xs text-black/60 dark:text-white/60">Net</p>
          <p class="mt-1 text-lg font-semibold">{{ net }}</p>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
