{% extends 'base.html' %}

{% block title %}
  Budgets
{% endblock %}

{% block content %}
  <h1>Budgets</h1>
  <p>
    <a href="{% url 'web-budget-create' %}">Add Budget</a>
  </p>

  <table border="1">
    <tr>
      <th>Category</th>
      <th>Limit</th>
      <th>Month</th>
      <th>Actions</th>
    </tr>
    {% for b in budgets %}
    <tr>
        <td>{{ b.category }}</td>
        <td>{{ b.limit }}</td>
        <td>{{ b.month|date:"F" }}</td>
        <td>
          <a href="{% url 'web-budget-edit' b.id %}"><button type="button">Edit</button></a>
          <form action="{% url 'web-budget-delete' b.id %}" method="post" style="display:inline">
            {% csrf_token %}
            <button type="submit" onclick="return confirm('Delete this budget?');">Delete</button>
          </form>
        </td>
    </tr>
    {% empty %}
      <tr>
        <td colspan="4">No budgets</td>
      </tr>
    {% endfor %}
  </table>
{% endblock %}
