{% extends 'base.html' %}

{% block title %}My Account{% endblock %}

{% block content %}
<h1>My Account</h1>
<p>Email: {{ user.email }}</p>
<p>Currency: {{ user.currency }}</p>
<p>Joined: {{ user.created_at }}</p>

<h2>Update Currency</h2>
<form method="post">
    {% csrf_token %}
    <p>Currency: <input type="text" name="currency" value="{{ user.currency }}"></p>
    <button type="submit">Update</button>
</form>
{% endblock %}
