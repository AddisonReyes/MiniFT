{% extends 'base.html' %}

{% block title %}Add Transaction{% endblock %}

{% block content %}
<h1>Add Transaction</h1>
<form method="post">
    {% csrf_token %}
    <p>Amount: <input type="number" step="0.01" name="amount" required></p>
    <p>Type:
        <select name="type" required>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>
    </p>
    <p>Category: <input type="text" name="category" required></p>
    <p>Note: <input type="text" name="note"></p>
    <p>Date: <input type="date" name="date" required></p>
    <button type="submit">Save</button>
</form>
<p><a href="/transactions/">Back to Transactions</a></p>
{% endblock %}
