services:
  db:
    image: postgres:16-alpine
    container_name: minift-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: minift
      POSTGRES_USER: minift
      POSTGRES_PASSWORD: minift
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 15

  backend:
    build:
      context: ./backend
    container_name: minift-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Use relative API calls and let nginx proxy /api -> backend
        VITE_API_URL: ""
    container_name: minift-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  postgres_data:
