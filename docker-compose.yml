services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: minift
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d minift"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minift
      JWT_SECRET: mini-ft-dev-secret-change-me
      ACCESS_TOKEN_TTL_MINUTES: 15
      REFRESH_TOKEN_TTL_DAYS: 30
      RECURRING_WORKER_INTERVAL_SECONDS: 30
      ROCKET_ADDRESS: 0.0.0.0
      ROCKET_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres_data:

networks:
  default:
    external: true
    name: services_default
