services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: minift
      POSTGRES_USER: minift
      POSTGRES_PASSWORD: minift
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minift -d minift"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "dev-only-change-me"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:8000"
      DATABASE_URL: "postgresql://minift:minift@db:5432/minift"
      PORT: "8000"
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  postgres_data:
